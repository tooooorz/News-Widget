name: Fetch News

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests 
        run: pip install requests

      - name: Run script 
        run: python script.py

      - name: Commit changes
        run: |
          git config --grobal user.name "github-actions"
          git config --grobal user.email "actions@github.com"
          
          git add news.json
          git commit -m "Update news" || exit 0
          git push
